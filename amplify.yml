version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "Pre-build Techno OMS Frontend"
        - echo "Commit: $AWS_COMMIT_ID"
        - test -f frontend/index.html && echo "index.html found" || (echo "index.html NOT FOUND" && exit 1)
    build:
      commands:
        - echo "No build step required - static HTML"
        - echo "API config dilakukan via Settings page di frontend (localStorage)"
    postBuild:
      commands:
        - echo "Build done"
        - ls -la frontend/
  artifacts:
    baseDirectory: frontend
    files:
      - "**/*"
  cache:
    paths: []
